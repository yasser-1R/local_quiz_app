{% extends "base.html" %}
{% block body_class %}bg-light{% endblock %}
{% block content %}
<header class="topbar">
  <h1>🎓 Modifier le quiz</h1>
  <a class="btn" href="/teacher">← Retour</a>
</header>

<main class="container">
  <div class="card">
    <div id="editor"
         data-quiz-id="{{ quiz.id }}"
         data-existing='{{ quiz | tojson | safe }}'></div>
  </div>
</main>

<script src="/static/js/quiz_editor.js"></script>
{% endblock %}
