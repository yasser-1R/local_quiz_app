{% extends "base.html" %}
{% block body_class %}bg-gradient center{% endblock %}
{% block content %}
<div class="card avatar-card" style="text-align:center; padding: 36px 32px;">
  <div style="font-size:52px; margin-bottom:8px;">🎓</div>
  <h1 style="margin-bottom:4px;">Accès Professeur</h1>
  <p class="muted" style="margin-bottom:24px;">{{ app_title }}</p>

  {% if request.query_params.get('bad') %}
    <div class="error">Mot de passe incorrect. Veuillez réessayer.</div>
  {% endif %}

  <form method="post" action="/teacher/login">
    <input type="password" name="password" autofocus required
           placeholder="Mot de passe..."
           style="text-align:center; margin-bottom:12px;" />
    <button class="btn primary full big" type="submit">Se connecter →</button>
  </form>
  <p class="muted small" style="margin-top:16px;">
    Mot de passe défini dans <code>app/config.py</code>
  </p>
</div>
{% endblock %}
